[tool.ruff]
target-version = "py311"
src = ["scripts"]
extend-exclude = [
  "*.md", "*.txt", "*.json", "*.csv", "*.html", "*.css", "*.js",
  "scripts/archive/*",
]

[tool.ruff.lint]
# Comprehensive rule selection for production code quality
select = [
  "E",    # pycodestyle errors
  "F",    # pyflakes
  "I",    # isort (import sorting)
  "B",    # flake8-bugbear (common bugs)
  "BLE",  # flake8-blind-except (catch specific exceptions)
  "C4",   # flake8-comprehensions (better list/dict comprehensions)
  "DTZ",  # flake8-datetimez (timezone-aware datetimes)
  "T10",  # flake8-debugger (no leftover breakpoints)
  "EM",   # flake8-errmsg (good error messages)
  "ISC",  # flake8-implicit-str-concat
  "G",    # flake8-logging-format
  "PIE",  # flake8-pie (misc lints)
  "T20",  # flake8-print (discourage prints in libraries)
  "PT",   # flake8-pytest-style
  "RET",  # flake8-return (consistent return statements)
  "SIM",  # flake8-simplify
  "TID",  # flake8-tidy-imports
  "UP",   # pyupgrade (modern Python syntax)
  "PL",   # Pylint rules
  "RUF",  # Ruff-specific rules (stray noqa, etc)
  "S",    # flake8-bandit (security checks for data pipelines)
  "ARG",  # flake8-unused-arguments
  "PTH",  # flake8-use-pathlib (prefer pathlib over os.path)
  "D",    # pydocstyle (docstrings - enforced selectively via per-file-ignores)
]

ignore = [
  # Line length - let formatter handle it
  "E501",
  
  # Import position - sometimes needed for conditional imports
  "E402",
  
  # Complexity - we'll review these manually rather than auto-fail
  "PLR0911",  # Too many return statements
  "PLR0912",  # Too many branches
  "PLR0913",  # Too many arguments
  "PLR0915",  # Too many statements
  "PLR2004",  # Magic value comparison (sometimes clearer than constants)
  
  # Simplification - be pragmatic
  "SIM108",   # Use ternary (sometimes if/else is clearer)
  "SIM105",   # Use contextlib.suppress (explicit try/except is clearer)
  
  # Return - allow flexibility
  "RET504",   # Unnecessary variable assignment before return (sometimes adds clarity)
  
  # Pylint - too opinionated
  "PLW2901",  # Loop variable overwritten (sometimes intentional)
  
  # Security - pragmatic exceptions for scripting
  "S603",     # subprocess without shell=True (we validate inputs)
  "S607",     # subprocess with partial path (OK for known tools)
  "S608",     # SQL injection (we don't use raw SQL strings)
  
  # Docstrings - only enforce on library code (see per-file-ignores)
  "D100",     # Missing module docstring (enforced selectively)
  "D101",     # Missing class docstring (enforced selectively)
  "D102",     # Missing method docstring (enforced selectively)
  "D103",     # Missing function docstring (enforced selectively)
  "D104",     # Missing package docstring
  "D105",     # Missing docstring in magic methods (unnecessary noise)
  "D107",     # Missing __init__ docstring
  "D415",     # First line should end with period (pedantic)
  "D205",     # 1 blank line required between summary and description (annoying)
  "D212",     # Multi-line docstring summary should start at first line (style preference)
  "D417",     # Missing argument description (fix incrementally)

  # Imports - pragmatic exceptions
  "F401",     # Unused import (often for availability testing or re-exports)
  
  # Arguments - allow flexibility
  "ARG001",   # Unused function argument (sometimes needed for interface compatibility)
  "ARG002",   # Unused method argument (sometimes needed for overrides)

  # Simplification - additional pragmatic exceptions
  "SIM102",   # Nested if statements (sometimes more readable)
  "SIM113",   # Enumerate instead of manual counter (style preference)
  "SIM115",   # Open context manager (sometimes not applicable)
  "SIM117",   # Multiple with statements (sometimes clearer separate)

  # Unicode/ambiguous characters - usually intentional
  "RUF001",   # Ambiguous unicode character in string
  "RUF002",   # Ambiguous unicode character in docstring
  "RUF003",   # Ambiguous unicode character in comment

  # Security - pragmatic for scripts
  "S101",     # assert (used for dev assertions, not security)
  "S324",     # Insecure hash (MD5/SHA1 used for file dedup, not security)
  "S602",     # subprocess with shell=True (validated inputs)
  "S104",     # Bind to all interfaces (intentional for local servers)
  "S108",     # Insecure temp file (scripts use proper temp handling)
  "S202",     # tarfile without filter (trusted archives)
  "S310",     # URL open (scripts fetch trusted URLs)
  "S506",     # Unsafe YAML loader (custom loaders are intentional)

  # Pytest - flexible testing styles
  "PT017",    # pytest.raises broad exception
  "PT018",    # pytest.raises composite assertion

  # Other pragmatic exceptions
  "PLW0603",  # Global statement (sometimes needed in scripts)
  "PLW1509",  # Preexec_fn in subprocess (intentional)
  "PLC0206",  # Dict iteration extracting keys (sometimes clearer)
  "RUF012",   # Mutable class attribute (intentional in many cases)
  "DTZ011",   # datetime.date.today() (OK for dates without time)
  "DTZ012",   # datetime.date.fromtimestamp (OK for dates)
  "DTZ004",   # datetime.utcfromtimestamp (legacy code)
  "B025",     # Duplicate exception handler (sometimes intentional)
  "B005",     # strip with multi-char (intentional)
  "B018",     # Useless expression (sometimes for side effects)
  "B023",     # Function uses loop variable (closure pattern is intentional)
  "B904",     # raise without from (legacy code, fix incrementally)
  "RUF005",   # Collection concatenation (sometimes clearer)
  "PTH107",   # os.remove (sometimes needed for compatibility)
  "PTH112",   # os.path.isdir (sometimes needed for compatibility)
  "PTH119",   # os.path.basename (sometimes needed for compatibility)
]

[tool.ruff.lint.per-file-ignores]
# Common legacy violations to ignore across script directories
# These are mechanical issues that should be fixed incrementally (see CODE_CONVENTIONS.md)
_legacy_ignores = [
  "PTH123",  # open() vs Path.open()
  "DTZ003", "DTZ005", "DTZ001", "DTZ006", "DTZ007",  # timezone-aware datetimes
  "G004",    # lazy logging format
  "PLC0415", # imports at top
  "BLE001",  # broad exception (often intentional in scripts)
  "S110", "S112",  # try-except-pass/continue
  "B007",    # Loop control variable not used (often intentional)
  "S311",    # random not for crypto (OK for non-security uses)
  "RUF034",  # Unnecessary parenthesized pass
  "G201",    # Logging .exception() usage
]

# CLI tools and workflow scripts can print (user-facing)
"scripts/tools/**" = [
  "T201",    # CLI tools print to user
  "PTH123", "DTZ003", "DTZ005", "DTZ001", "DTZ006", "DTZ007",
  "G004", "PLC0415", "BLE001", "S110", "S112", "B007", "S311", "RUF034", "G201",
]

"scripts/dashboard/**" = [
  "T201",    # Dashboard app
  "PTH123", "DTZ003", "DTZ005", "DTZ001", "DTZ006", "DTZ007",
  "G004", "PLC0415", "BLE001", "S110", "S112", "B007", "S311", "RUF034", "G201",
]

"scripts/data_pipeline/**" = [
  "T201",    # Data pipeline scripts
  "PTH123", "DTZ003", "DTZ005", "DTZ001", "DTZ006", "DTZ007",
  "G004", "PLC0415", "BLE001", "S110", "S112", "B007", "S311", "RUF034", "G201",
]

"scripts/backup/**" = [
  "T201",    # Backup scripts
  "PTH123", "DTZ003", "DTZ005", "DTZ001", "DTZ006", "DTZ007",
  "G004", "PLC0415", "BLE001", "S110", "S112", "B007", "S311", "RUF034", "G201",
]

"scripts/ai/**" = [
  "T201",    # AI scripts
  "PTH123", "DTZ003", "DTZ005", "DTZ001", "DTZ006", "DTZ007",
  "G004", "PLC0415", "BLE001", "S110", "S112", "B007", "S311", "RUF034", "G201",
]

"scripts/[0-9][0-9]*_*.py" = [
  "T201",    # Prints OK in user-facing workflow scripts
  "PTH123", "DTZ003", "DTZ005", "DTZ001", "DTZ006", "DTZ007",
  "G004", "PLC0415", "BLE001", "S110", "S112", "B007", "S311", "RUF034", "G201",
]

"scripts/*.py" = [
  "T201",    # Top-level scripts
  "PTH123", "DTZ003", "DTZ005", "DTZ001", "DTZ006", "DTZ007",
  "G004", "PLC0415", "BLE001", "S110", "S112", "B007", "S311", "RUF034", "G201",
]

# Test files have different requirements
"**/tests/**" = [
  "T201",    # Prints for debugging
  "PT009",   # unittest-style assertions OK (pytest auto-rewrites)
  "PT027",   # pytest.raises without match OK
  "S101",    # assert allowed (required for pytest)
  "PLR2004", # Magic values OK in tests
  "PTH123", "DTZ003", "DTZ005", "DTZ001", "DTZ006", "DTZ007",
  "G004", "PLC0415", "BLE001", "S110", "S112", "B007", "S311", "RUF034", "G201",
]

# Library/utility code - legacy violations, fix when touching files
"scripts/utils/**" = [
  "PTH123", "DTZ003", "DTZ005", "DTZ001", "DTZ006", "DTZ007",
  "G004", "PLC0415", "BLE001", "S110", "S112", "B007", "S311", "RUF034", "G201",
]

[tool.ruff.lint.flake8-bugbear]
# Extend default checks
extend-immutable-calls = ["fastapi.Depends", "fastapi.Query"]

[tool.ruff.lint.isort]
known-first-party = ["scripts"]
combine-as-imports = true

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false  # Gradually enable this
check_untyped_defs = true

[tool.pytest.ini_options]
testpaths = ["scripts/tests"]
markers = [
    "local_only: Tests requiring local data/environment (auto-skipped in CI)",
    "selenium: Tests requiring browser/Selenium WebDriver (auto-skipped in CI)",
]
